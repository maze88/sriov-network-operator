name: SR-IOV Network Operator Docker CI

env:
  REGISTRY: nvcr.io/nvstaging/mellanox
  BUILD_PLATFORMS: linux/amd64,linux/arm64,linux/ppc64le

on:
  push:
    branches:
    - feature/ci  # TODO: remove after development
    - network-operator-*
    tags:
    - network-operator-*

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - component: controller
          image_name: ${{ github.repository }}
          dockerfile: Dockerfile
        - component: config-daemon
          image_name: ${{ github.repository }}-config-daemon
          dockerfile: Dockerfile.sriov-network-config-daemon
        - component: webhook
          image_name: ${{ github.repository }}-webhook
          dockerfile: Dockerfile.webhook
    steps:
    - uses: actions/checkout@v3
    - if: github.ref_type == 'branch'
      name: Determine docker tag (when git branch)
      run: echo DOCKER_TAG=$(git rev-parse --short HEAD) >> $GITHUB_ENV  # short git commit hash
    - if: github.ref_type == 'tag'
      name: Determine docker tag (when git tag)
      run: echo DOCKER_TAG=${{ github.ref_name }} >> $GITHUB_ENV
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v2
    - uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NVCR_USERNAME }}
        password: ${{ secrets.NVCR_TOKEN }}
    - uses: docker/build-push-action@v4
      with:
        platforms: ${{ env.BUILD_PLATFORMS }}
        context: .
        file: ${{ matrix.dockerfile }}
        tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}-mzeevi-test:${{ env.DOCKER_TAG }}  # TODO: remove suffix '-mzeevi-test' before merging
        push: true
    - name: Store Docker tag for next job
      id: store-docker-tag
      run: echo DOCKER_TAG=$DOCKER_TAG >> $GITHUB_OUTPUT
    outputs:
      docker_tag: ${{ steps.store-docker-tag.outputs.DOCKER_TAG }}

  update_network_operator_values:
    needs: build_and_push_image
    runs-on: ubuntu-latest
    env:
      DOCKER_TAG: ${{ needs.build_and_push_image.outputs.docker_tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: maze88/network-operator  # TODO: change org to Mellanox before merging
        sparse-checkout-cone-mode: false
        sparse-checkout: deployment/network-operator/values.yaml
    - name: Update image tags in network-operator values and create PR
      run: |
        git config user.name  svc-cloud-orch-ci
        git config user.email svc-cloud-orch-ci@nvidia.com
        git checkout -b feature/update-sriov-tags-to-$DOCKER_TAG
        sed -Ei "s/:network-operator-.+/:$DOCKER_TAG/g" deployment/network-operator/values.yaml
        git commit -am "task: update SR-IOV images tags to $DOCKER_TAG in chart values"
        git diff HEAD~1 --color --unified=0 --exit-code || \
          gh pr create \
            --repo Mellanox/network-operator \
            --base master \
            --head $(git branch --show-current) \
            --fill \
            --body "Created by [${{ github.repository }} CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (*${{ github.job }}* job), after syncing fork from upstream."  # creates PR only if actually changed
