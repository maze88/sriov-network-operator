name: SR-IOV Network Operator Docker CI

env:
  BUILD_PLATFORMS: linux/amd64,linux/arm64,linux/ppc64le
  REGISTRY: nvcr.io/nvstaging/mellanox
  IMAGE_BASE_NAME: ${{ github.repository }}-mzeevi-test  # TODO: remove suffix after developing

on:
  push:
    branches:
    - feature/ci  # TODO: remove after development
    - network-operator-*
    tags:
    - network-operator-*

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:  # TODO: see runtime output readability and consider ommiting redundant component field
        - component: controller
          image_name: ${{ env.IMAGE_BASE_NAME }}
          dockerfile: Dockerfile
        - component: config-daemon
          image_name: ${{ env.IMAGE_BASE_NAME }}-config-daemon
          dockerfile: Dockerfile.sriov-network-config-daemon
        - component: webhook
          image_name: ${{ env.IMAGE_BASE_NAME }}-webhook
          dockerfile: Dockerfile.webhook
    steps:
    - uses: actions/checkout@v3
    - if: github.ref_type == 'branch'
      name: Determine docker tag (when git branch)
      run: echo DOCKER_TAG=$(git rev-parse --short HEAD) >> $GITHUB_ENV  # short git commit hash  # TODO: ask if should be prefixed with 'network-operator-'
    - if: github.ref_type == 'tag'
      name: Determine docker tag (when git tag)
      run: echo DOCKER_TAG=${{ github.ref_name }} >> $GITHUB_ENV
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v2
    - uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NVCR_USERNAME }}
        password: ${{ secrets.NVCR_TOKEN }}
    - uses: docker/build-push-action@v4
      with:
        platforms: ${{ env.BUILD_PLATFORMS }}
        context: .
        file: ${{ matrix.dockerfile }}
        tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ env.DOCKER_TAG }}
        # push: true  # TODO: uncomment after development
