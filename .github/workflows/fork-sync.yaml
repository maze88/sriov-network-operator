name: Sync Fork

on:
  schedule:
  - cron: "0 0 * * *"  # nightly
  workflow_dispatch:   # enable manual trigger

env:
  DEFAULT_BRANCH: master

jobs:
  sync-fork:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Lookup most recent release branch
      id: lookup-most-recent-release-branch
      run: |
        git fetch --all
        echo most_recent_release_branch=$(git branch --remotes --sort refname | grep network-operator- | tail -n 1 | cut -d "/" -f 2-) >> $GITHUB_OUTPUT
    - uses: tgymnich/fork-sync@v1.8
      with:
        owner: k8snetworkplumbingwg  # upstream
        head: master                 # upstream
        base: ${{ steps.lookup-most-recent-release-branch.outputs.most_recent_release_branch }}  # downstream
        pr_title: "task: Sync from upstream"
        pr_message: "Created by [$GITHUB_REPOSITORY CI]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) ($GITHUB_JOB job), after syncing the fork from upstream."  # TODO: test link
        # ignore_fail: true  # TODO: add a condition to this step, in order to avoid the 4 minute wait when no changes detected in upstream
      timeout-minutes: 1
      continue-on-error: true
    outputs:
      most_recent_release_branch: ${{ steps.lookup-most-recent-release-branch.outputs.most_recent_release_branch }}

  update-network-operator-values:
    runs-on: ubuntu-latest
    needs: sync-fork
    env:
      MOST_RECENT_RELEASE_BRANCH: ${{ needs.sync-fork.outputs.most_recent_release_branch }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: maze88/network-operator  # TODO: change org to Mellanox before merging
        sparse-checkout-cone-mode: false
        sparse-checkout: deployment/network-operator/values.yaml
    - name: Update image tags in network-operator values
      run: |
        git checkout -b feature/update-sriov-to-${MOST_RECENT_RELEASE_BRANCH:17}-$GITHUB_RUN_ID  # TODO: remove run id suffix before merging
        sed -Ei "s/:network-operator-.+/:$MOST_RECENT_RELEASE_BRANCH/g" deployment/network-operator/values.yaml
        git commit -am "task: update SR-IOV images' tags to ${MOST_RECENT_RELEASE_BRANCH:17} in chart values"
        git log -n 3  # debug
        # git push
    - name: Create pull request  # TODO: only needed if diff
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # TODO: add to repo settings
      run: |
        git branch  # debug; validate we are still on branch from previous step
        gh pr create --dry-run \
          -B ${{ env.DEFAULT_BRANCH }} \
          -H branch_to_merge \
          --title 'task: Update SR-IOV image tags to $MOST_RECENT_RELEASE_BRANCH in chart values' \
          --body  'Created by [$GITHUB_REPOSITORY CI]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID) ($GITHUB_JOB job), after syncing the fork from upstream.'  # TODO: test link  # TODO: remove dry-run when ready
